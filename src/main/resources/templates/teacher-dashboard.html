<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Teacher Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }

.topbar {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 0 30px; height: 65px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-brand img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #f5576c; }
.topbar-brand span { color: white; font-size: 18px; font-weight: 700; }

.hero-banner {
    background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
    padding: 30px; color: white; position: relative; overflow: hidden;
}
.hero-banner::before {
    content: ''; position: absolute; right: -50px; top: -50px;
    width: 200px; height: 200px; background: rgba(245,87,108,0.1); border-radius: 50%;
}
.teacher-avatar-large {
    width: 80px; height: 80px; border-radius: 50%;
    border: 4px solid #f5576c; box-shadow: 0 0 20px rgba(245,87,108,0.4);
}

.content-area { padding: 25px 30px; }

.section-card {
    background: white; border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 20px;
}
.section-header {
    padding: 18px 25px; border-bottom: 1px solid #f0f0f0;
    display: flex; justify-content: space-between; align-items: center;
}
.section-header h6 { margin: 0; font-weight: 700; color: #1a1a2e; }
.section-body { padding: 25px; }

.form-label { font-weight: 600; color: #555; font-size: 13px; }
.form-control, .form-select {
    border: 2px solid #e8e8e8; border-radius: 10px; padding: 10px 15px; font-size: 14px;
}
.form-control:focus, .form-select:focus {
    border-color: #f5576c; box-shadow: 0 0 0 0.2rem rgba(245,87,108,0.15);
}

.btn-submit {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    border: none; border-radius: 10px; padding: 11px 25px;
    color: white; font-weight: 600; transition: all 0.3s;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245,87,108,0.4); }

.table th { background: #f8f9fa; font-weight: 600; font-size: 13px; color: #555; border: none; }
.table td { vertical-align: middle; font-size: 14px; border-color: #f0f0f0; }
.table tbody tr:hover { background: #fafafa; }

.profile-item {
    display: flex; align-items: center; padding: 12px 0;
    border-bottom: 1px solid #f5f5f5;
}
.profile-item:last-child { border-bottom: none; }
.profile-item-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: white; margin-right: 12px; flex-shrink: 0;
}
.profile-item-label { font-size: 11px; color: #999; }
.profile-item-value { font-size: 14px; font-weight: 600; color: #333; }

.logout-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
    color: white; border-radius: 8px; padding: 8px 18px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s;
}
.logout-btn:hover { background: rgba(255,255,255,0.2); }

.stat-mini {
    background: white; border-radius: 12px; padding: 15px 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08); text-align: center;
}
.stat-mini h4 { font-size: 24px; font-weight: 700; margin: 0; }
.stat-mini p { font-size: 12px; color: #888; margin: 4px 0 0; }

.alert-toast {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    min-width: 280px; border-radius: 12px; padding: 15px 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none;
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
    <div class="topbar-brand">
        <img src="https://ui-avatars.com/api/?name=Teacher&background=f5576c&color=fff&size=38" alt="Teacher">
        <span>EduPortal</span>
    </div>
    <div style="display:flex;align-items:center;gap:15px">
        <form method="post" th:action="@{/logout}" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
        </form>
    </div>
</div>

<!-- Hero Banner -->
<div class="hero-banner">
    <div class="d-flex align-items-center gap-4">
        <img src="https://ui-avatars.com/api/?name=Teacher+User&background=f5576c&color=fff&size=80&bold=true" 
             class="teacher-avatar-large" alt="Teacher" id="heroAvatar">
        <div>
            <h4 class="mb-1" id="heroName">Welcome, Teacher!</h4>
            <p class="mb-1" style="color:rgba(255,255,255,0.7);font-size:14px">
                <i class="fas fa-book me-2"></i>Subject: <span id="heroSubject" class="badge" style="background:rgba(245,87,108,0.3)">-</span>
            </p>
            <p class="mb-0" style="color:rgba(255,255,255,0.7);font-size:13px">
                <i class="fas fa-envelope me-2"></i><span id="heroEmail">-</span>
            </p>
        </div>
    </div>
</div>

<div class="content-area">
    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-mini">
                <h4 style="color:#667eea" id="totalStudents">0</h4>
                <p><i class="fas fa-users me-1"></i>Total Students</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-mini">
                <h4 style="color:#4facfe" id="totalCourses">0</h4>
                <p><i class="fas fa-book-open me-1"></i>Total Courses</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-mini">
                <h4 style="color:#43e97b" id="totalResults">0</h4>
                <p><i class="fas fa-chart-bar me-1"></i>Results Added</p>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Left Column -->
        <div class="col-lg-8">
            <!-- Add Marks -->
            <div class="section-card">
                <div class="section-header">
                    <h6><i class="fas fa-pen-alt me-2" style="color:#f5576c"></i>Add Student Marks</h6>
                </div>
                <div class="section-body">
                    <form id="marksForm">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label">Select Student</label>
                                <select class="form-select" id="studentId" required>
                                    <option value="">Choose a student...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Marks (0-100)</label>
                                <input type="number" class="form-control" placeholder="Enter marks" id="marks" min="0" max="100" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Grade</label>
                                <select class="form-select" id="grade" required>
                                    <option value="">Select grade...</option>
                                    <option value="A">A — Excellent (90-100)</option>
                                    <option value="B">B — Good (80-89)</option>
                                    <option value="C">C — Average (70-79)</option>
                                    <option value="D">D — Pass (60-69)</option>
                                    <option value="F">F — Fail (Below 60)</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn-submit">
                                    <i class="fas fa-check me-2"></i>Submit Marks
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Results Table -->
            <div class="section-card">
                <div class="section-header">
                    <h6><i class="fas fa-chart-bar me-2" style="color:#43e97b"></i>Student Results</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadResults()"><i class="fas fa-sync me-1"></i>Refresh</button>
                </div>
                <table class="table table-hover mb-0">
                    <thead><tr><th class="ps-4">Result ID</th><th>Student</th><th>Marks</th><th>Grade</th></tr></thead>
                    <tbody id="resultTable"></tbody>
                </table>
            </div>

            <!-- Courses Table -->
            <div class="section-card">
                <div class="section-header">
                    <h6><i class="fas fa-graduation-cap me-2" style="color:#4facfe"></i>Available Courses</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadCourses()"><i class="fas fa-sync me-1"></i>Refresh</button>
                </div>
                <table class="table table-hover mb-0">
                    <thead><tr><th class="ps-4">ID</th><th>Course Name</th><th>Duration</th><th>Fees</th></tr></thead>
                    <tbody id="courseTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Right Column -->
        <div class="col-lg-4">
            <!-- Profile Card -->
            <div class="section-card mb-4">
                <div class="section-header">
                    <h6><i class="fas fa-user-tie me-2" style="color:#f5576c"></i>My Profile</h6>
                </div>
                <div class="section-body">
                    <div class="text-center mb-4">
                        <img src="https://ui-avatars.com/api/?name=Teacher+User&background=f5576c&color=fff&size=80&bold=true" 
                             class="rounded-circle" style="width:80px;height:80px;border:4px solid #f5576c" id="profileAvatar" alt="Teacher">
                    </div>
                    <div class="profile-item">
                        <div class="profile-item-icon" style="background:#f5576c"><i class="fas fa-user"></i></div>
                        <div><div class="profile-item-label">Full Name</div><div class="profile-item-value" id="teacherName">-</div></div>
                    </div>
                    <div class="profile-item">
                        <div class="profile-item-icon" style="background:#4facfe"><i class="fas fa-envelope"></i></div>
                        <div><div class="profile-item-label">Email</div><div class="profile-item-value" id="teacherEmail" style="font-size:12px">-</div></div>
                    </div>
                    <div class="profile-item">
                        <div class="profile-item-icon" style="background:#43e97b"><i class="fas fa-book"></i></div>
                        <div><div class="profile-item-label">Subject</div><div class="profile-item-value" id="teacherSubject">-</div></div>
                    </div>
                </div>
            </div>

            <!-- Students List -->
            <div class="section-card">
                <div class="section-header">
                    <h6><i class="fas fa-users me-2" style="color:#667eea"></i>All Students</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadStudents()"><i class="fas fa-sync"></i></button>
                </div>
                <table class="table table-hover mb-0">
                    <thead><tr><th class="ps-3">ID</th><th>Name</th></tr></thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="alert-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg, type) {
    let t = document.getElementById('toast');
    t.className = 'alert-toast alert alert-' + (type || 'success');
    t.innerHTML = '<i class="fas fa-' + (type === 'danger' ? 'times' : 'check') + '-circle me-2"></i>' + msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

$(document).ready(function() { loadStudents(); loadCourses(); loadProfile(); loadResults(); });

function loadProfile() {
    $.get('/teacher/profile', function(data) {
        if(data) {
            let name = data.name || 'Teacher';
            $('#teacherName').text(name);
            $('#teacherEmail').text(data.email);
            $('#teacherSubject').text(data.subject);
            $('#heroName').text('Welcome, ' + name + '!');
            $('#heroSubject').text(data.subject);
            $('#heroEmail').text(data.email);
            let avatarUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=f5576c&color=fff&size=80&bold=true';
            $('#heroAvatar').attr('src', avatarUrl);
            $('#profileAvatar').attr('src', avatarUrl);
        }
    });
}

$('#marksForm').submit(function(e) {
    e.preventDefault();
    let studentName = $('#studentId option:selected').text();
    $.ajax({ url: '/teacher/addMarks', type: 'POST', contentType: 'application/json',
        data: JSON.stringify({ studentId: $('#studentId').val(), marks: $('#marks').val(), grade: $('#grade').val() }),
        success: function() { showToast('Marks added for ' + studentName + '!'); $('#marksForm')[0].reset(); loadResults(); },
        error: function() { showToast('Failed to add marks!', 'danger'); }
    });
});

function loadStudents() {
    $.get('/admin/students', function(data) {
        $('#totalStudents').text(data.length);
        let html = '', options = '<option value="">Choose a student...</option>';
        data.forEach(s => {
            html += `<tr>
                <td class="ps-3"><span class="badge bg-light text-dark">#${s.studentId}</span></td>
                <td><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=667eea&color=fff&size=26" class="rounded-circle me-2" style="width:26px;height:26px">${s.name}</td>
            </tr>`;
            options += `<option value="${s.studentId}">${s.name} (ID: ${s.studentId})</option>`;
        });
        $('#studentTable').html(html || '<tr><td colspan="2" class="text-center py-3 text-muted">No students</td></tr>');
        $('#studentId').html(options);
    });
}

function loadCourses() {
    $.get('/admin/courses', function(data) {
        $('#totalCourses').text(data.length);
        let html = '';
        data.forEach(c => {
            html += `<tr>
                <td class="ps-4"><span class="badge bg-light text-dark">#${c.courseId}</span></td>
                <td><i class="fas fa-book-open me-2" style="color:#4facfe"></i>${c.courseName}</td>
                <td>${c.duration}</td><td><strong>₹${c.fees}</strong></td>
            </tr>`;
        });
        $('#courseTable').html(html || '<tr><td colspan="4" class="text-center py-3 text-muted">No courses</td></tr>');
    });
}

function loadResults() {
    $.get('/teacher/results', function(results) {
        $('#totalResults').text(results.length);
        $.get('/admin/students', function(students) {
            let html = '';
            if(results.length === 0) {
                html = '<tr><td colspan="4" class="text-center py-4 text-muted">No results yet</td></tr>';
            } else {
                results.forEach(r => {
                    let student = students.find(s => s.studentId === r.studentId);
                    let sName = student ? student.name : 'Unknown';
                    html += `<tr>
                        <td class="ps-4">#${r.resultId}</td>
                        <td><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(sName)}&background=667eea&color=fff&size=26" class="rounded-circle me-2" style="width:26px;height:26px">${sName}</td>
                        <td><div class="progress" style="height:6px;width:80px;display:inline-block;vertical-align:middle;margin-right:6px"><div class="progress-bar bg-${getGradeColor(r.grade)}" style="width:${r.marks}%"></div></div>${r.marks}/100</td>
                        <td><span class="badge bg-${getGradeColor(r.grade)} rounded-pill">${r.grade}</span></td>
                    </tr>`;
                });
            }
            $('#resultTable').html(html);
        });
    });
}

function getGradeColor(g) {
    return {A:'success',B:'primary',C:'info',D:'warning',F:'danger'}[g] || 'secondary';
}
</script>
</body>
</html>
