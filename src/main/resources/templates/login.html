<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Login - Online Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-y: auto;
    padding: 20px 0;
}

body::before {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    top: -250px;
    right: -250px;
}

body::after {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    bottom: -200px;
    left: -200px;
}

.login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 450px;
    padding: 20px;
    margin: auto;
}

.login-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: slideUp 0.5s ease-out;
    max-height: 90vh;
    overflow-y: auto;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logo-section {
    text-align: center;
    margin-bottom: 20px;
}

.logo-icon {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

.logo-icon i {
    font-size: 35px;
    color: white;
}

.login-title {
    font-size: 24px;
    font-weight: 700;
    color: #333;
    margin-bottom: 5px;
}

.login-subtitle {
    color: #666;
    font-size: 14px;
}

.form-group {
    margin-bottom: 15px;
    position: relative;
}

.form-label {
    font-weight: 600;
    color: #555;
    margin-bottom: 8px;
    font-size: 14px;
}

.input-group {
    position: relative;
}

.input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #667eea;
    z-index: 10;
}

.form-control {
    padding: 12px 15px 12px 45px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    transition: all 0.3s ease;
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    outline: none;
}

.btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

.divider {
    text-align: center;
    margin: 20px 0;
    position: relative;
}

.divider::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 1px;
    background: #e0e0e0;
}

.divider span {
    background: white;
    padding: 0 15px;
    position: relative;
    color: #999;
    font-size: 13px;
}

.demo-credentials {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 15px;
    margin-top: 15px;
}

.demo-title {
    font-size: 13px;
    font-weight: 600;
    color: #666;
    margin-bottom: 12px;
    text-align: center;
}

.credential-item {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    background: white;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 12px;
}

.credential-item:last-child {
    margin-bottom: 0;
}

.credential-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    font-size: 14px;
}

.admin-icon {
    background: #ff6b6b;
    color: white;
}

.student-icon {
    background: #4ecdc4;
    color: white;
}

.teacher-icon {
    background: #ffd93d;
    color: #333;
}

.credential-text {
    flex: 1;
}

.credential-label {
    font-weight: 600;
    color: #333;
}

.credential-value {
    color: #666;
    font-size: 12px;
}

.alert {
    border-radius: 10px;
    padding: 12px 15px;
    margin-bottom: 20px;
    border: none;
    animation: shake 0.5s ease;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
}

.alert-danger {
    background: #fee;
    color: #c33;
}

.alert-success {
    background: #efe;
    color: #3c3;
}

.alert i {
    margin-right: 8px;
}

.footer-text {
    text-align: center;
    margin-top: 15px;
    color: white;
    font-size: 12px;
}

@media (max-width: 576px) {
    .login-card {
        padding: 30px 20px;
    }
    
    .login-title {
        font-size: 24px;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">University Management System</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            <strong>Login Failed!</strong> Invalid username or password.
        </div>
        
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            You have been logged out successfully.
        </div>

        <form method="post" th:action="@{/login}" id="loginForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Login to Dashboard
            </button>
        </form>

        <div class="divider">
            <span>Demo Credentials</span>
        </div>

        <div class="demo-credentials">
            <div class="demo-title">Use these credentials to test</div>
            
            <div class="credential-item">
                <div class="credential-icon admin-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="credential-text">
                    <div class="credential-label">Admin</div>
                    <div class="credential-value">admin / admin123</div>
                </div>
            </div>

            <div class="credential-item">
                <div class="credential-icon student-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div class="credential-text">
                    <div class="credential-label">Student</div>
                    <div class="credential-value">Use your email / password</div>
                </div>
            </div>

            <div class="credential-item">
                <div class="credential-icon teacher-icon">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
                <div class="credential-text">
                    <div class="credential-label">Teacher</div>
                    <div class="credential-value">Use your email / password</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-text">
        <i class="fas fa-shield-alt"></i> Secure Login 
    </div>
</div>

<script>
// Remove error/success message from URL after 3 seconds
if (window.location.search.includes('error') || window.location.search.includes('logout')) {
    setTimeout(function() {
        window.history.replaceState({}, document.title, window.location.pathname);
    }, 3000);
}
</script>

</body>
</html>
